name: Tauri Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    name: Build Tauri (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf pkg-config libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libgtk-3-dev build-essential libssl-dev

      - name: Install Trunk
        uses: baptiste0928/cargo-install@v3
        with:
          crate: trunk
          locked: true

      - name: Install Tauri CLI
        uses: baptiste0928/cargo-install@v3
        with:
          crate: tauri-cli
          locked: true

      - name: Build Tauri (no bundle)
        run: cargo tauri build --no-bundle
